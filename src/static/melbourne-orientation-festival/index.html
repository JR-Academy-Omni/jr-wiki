<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>2026 S2 墨尔本新生节 · 商家合作企划 · 匠人学院</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="bar"></div>

<div class="top">
  <span class="name">2026 S2 墨尔本三校新生节 · 商家合作企划</span>
  <span class="seg">封面</span>
</div>
<span class="tip">← → / 空格 翻页 · G 总览 · F 全屏</span>

<div class="deck">
  <div class="frame"></div>
</div>

<div class="hud">
  <button class="prev" title="上一页（←）">‹</button>
  <span class="count"></span>
  <button class="next" title="下一页（→）">›</button>
  <span class="sep"></span>
  <button class="grid-btn" title="缩略图总览（G）">▦</button>
  <button class="fs-btn" title="全屏（F）">⛶</button>
</div>

<div class="grid">
  <button class="gclose" title="关闭（Esc）">✕</button>
  <h2>全部 38 页 · 点击跳转</h2>
  <div class="thumbs"></div>
</div>

<div class="loader"><div class="ring"></div></div>

<script src="deck.js"></script>
</body>
</html>
